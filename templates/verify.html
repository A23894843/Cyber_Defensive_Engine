<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity - Adaptive Cyber Defensive Engine</title>

    <style>

        /* =========================================
           CSS VARIABLES (Shared architecture)
           ========================================= */
        :root{

            --bg:#0f172a;
            --bg2:#111827;

            --card:rgba(255,255,255,0.08);
            --border:rgba(255,255,255,0.12);

            --text:#f8fafc;
            --muted:#94a3b8;

            --primary:#38bdf8;
            --gold:#fbbf24;
            --purple:#8b5cf6;
            --green:#22c55e; /* Added green for success/verification states */

            --shadow:0 10px 35px rgba(0,0,0,0.45);
        }

        body.light-theme{

            --bg:#f1f5f9;
            --bg2:#ffffff;

            --card:rgba(255,255,255,0.75);
            --border:rgba(15,23,42,0.08);

            --text:#0f172a;
            --muted:#475569;

            --primary:#0284c7;
            --gold:#d97706;
            --purple:#7c3aed;
            --green:#16a34a;

            --shadow:0 10px 25px rgba(0,0,0,0.08);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* Centered Flexbox Layout */
        body{

            background:
                radial-gradient(circle at top left,#1e293b 0%,transparent 25%),
                radial-gradient(circle at bottom right,#0f172a 0%,transparent 25%),
                linear-gradient(135deg,var(--bg),var(--bg2));

            color:var(--text);

            font-family:'Segoe UI',sans-serif;

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:20px;

            transition:0.4s ease;
        }

        body.light-theme{

            background:
                radial-gradient(circle at top left,#bfdbfe 0%,transparent 25%),
                radial-gradient(circle at bottom right,#dbeafe 0%,transparent 25%),
                linear-gradient(135deg,#f8fafc,#e2e8f0);

        }

        /* Container specific to the OTP verification view (slightly narrower than setup) */
        .verify-container{

            width:100%;
            max-width:480px;

            background:var(--card);

            border:1px solid var(--border);

            backdrop-filter:blur(20px);

            border-radius:28px;

            padding:40px;

            box-shadow:var(--shadow);

            position:relative;

            overflow:hidden;

            text-align:center; /* Centered text is optimal for OTP screens */

            animation:fadeIn 0.7s ease;
        }

        .verify-container::before{

            content:"";

            position:absolute;

            top:0;
            left:0;

            width:100%;
            height:5px;

            background:linear-gradient(
                to right,
                var(--primary),
                var(--purple),
                var(--gold)
            );
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        .top-bar{

            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:28px;
        }

        .status-badge{

            display:flex;
            align-items:center;
            gap:10px;

            padding:10px 18px;

            border-radius:50px;

            background:rgba(34,197,94,0.12);

            border:1px solid rgba(34,197,94,0.3);

            color:var(--green);

            font-size:0.82rem;

            font-weight:600;
        }

        .pulse-dot{

            width:10px;
            height:10px;

            border-radius:50%;

            background:var(--green);

            animation:pulse 1.5s infinite;
        }

        @keyframes pulse{

            0%{
                box-shadow:0 0 0 0 rgba(34,197,94,0.7);
            }

            70%{
                box-shadow:0 0 0 10px rgba(34,197,94,0);
            }

            100%{
                box-shadow:0 0 0 0 rgba(34,197,94,0);
            }

        }

        .theme-toggle{

            width:72px;
            height:38px;

            border-radius:40px;

            background:rgba(255,255,255,0.08);

            border:1px solid var(--border);

            display:flex;
            align-items:center;

            padding:4px;

            position:relative;

            cursor:pointer;
        }

        .theme-toggle::before{
            content:"☀️";
            position:absolute;
            left:8px;
            font-size:13px;
        }

        .theme-toggle::after{
            content:"🌙";
            position:absolute;
            right:8px;
            font-size:13px;
        }

        .toggle-ball{

            width:28px;
            height:28px;

            border-radius:50%;

            background:linear-gradient(
                135deg,
                var(--primary),
                var(--purple)
            );

            transition:0.3s ease;

            z-index:2;
        }

        body.light-theme .toggle-ball{
            transform:translateX(34px);
        }

        /* Large circular lock icon indicator */
        .status-icon{

            width:90px;
            height:90px;

            margin:0 auto 24px;

            border-radius:24px;

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:2.5rem;

            background:rgba(34,197,94,0.12);

            border:1px solid rgba(34,197,94,0.25);

            box-shadow:0 0 35px rgba(34,197,94,0.2);
        }

        h1{

            font-size:2rem;
            font-weight:700;

            background:linear-gradient(
                to right,
                var(--primary),
                var(--purple)
            );

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

            margin-bottom:14px;
        }

        p{

            color:var(--muted);

            font-size:0.95rem;

            line-height:1.8;

            margin-bottom:32px;
        }

        /* =========================================
           SPECIALIZED OTP INPUT FIELD
           ========================================= */
        .otp-input{

            width:100%;

            padding:18px;

            border-radius:18px;

            border:1px solid var(--border);

            background:rgba(255,255,255,0.04);

            color:var(--gold);

            /* Enlarged font and letter spacing for clear OTP visibility */
            font-size:2rem;

            text-align:center;

            letter-spacing:10px;

            outline:none;

            transition:0.3s ease;

            margin-bottom:24px;

            font-weight:700;
        }

        .otp-input:focus{

            border-color:var(--primary);

            box-shadow:0 0 20px rgba(56,189,248,0.25);
        }

        button{

            width:100%;

            padding:16px;

            border:none;

            border-radius:18px;

            background:linear-gradient(
                135deg,
                var(--primary),
                var(--purple)
            );

            color:white;

            font-weight:700;

            font-size:0.95rem;

            letter-spacing:0.5px;

            cursor:pointer;

            transition:0.3s ease;

            box-shadow:0 10px 25px rgba(56,189,248,0.25);
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:0 15px 35px rgba(56,189,248,0.45);
        }

        .security-info{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:14px;

            margin-top:28px;
        }

        .mini-card{

            background:rgba(255,255,255,0.04);

            border:1px solid var(--border);

            border-radius:18px;

            padding:15px;
        }

        .mini-card h3{

            color:var(--primary);

            font-size:0.85rem;

            margin-bottom:6px;
        }

        .mini-card p{

            font-size:0.75rem;

            margin:0;

            color:var(--muted);

            line-height:1.5;
        }

        /* "Go Back / Resend" Link */
        .resend-link{

            display:inline-block;

            margin-top:28px;

            color:var(--muted);

            text-decoration:none;

            font-size:0.85rem;

            transition:0.3s ease;
        }

        .resend-link:hover{
            color:var(--primary);
        }

        @media(max-width:600px){

            .verify-container{
                padding:30px 22px;
            }

            h1{
                font-size:1.6rem;
            }

            .otp-input{
                font-size:1.5rem;
                letter-spacing:6px; /* Reduced letter spacing on mobile */
            }

            .security-info{
                grid-template-columns:1fr;
            }

        }

    </style>
</head>

<body>

<div class="verify-container">

    <div class="top-bar">

        <div class="status-badge">
            <span class="pulse-dot"></span>
            PQC Authentication Active
        </div>

        <div class="theme-toggle" id="themeToggle">
            <div class="toggle-ball"></div>
        </div>

    </div>

    <!-- Visual Confirmation Graphic -->
    <div class="status-icon">
        🔒
    </div>

    <h1>Two-Factor Authentication</h1>

    <p>
        A secure 6-digit verification code has been sent to your registered administrator email address.
    </p>

    <!-- OTP Submission Form: Triggers POST to Flask backend (/verify) to validate the cryptographic token -->
    <form action="/verify" method="POST">

        <!-- Input restricted to 6 characters, prevents autocomplete from interfering -->
        <input
            type="text"
            name="otp"
            class="otp-input"
            placeholder="000000"
            maxlength="6"
            required
            autocomplete="off"
        >

        <button type="submit">
            VERIFY & ACCESS DASHBOARD
        </button>

    </form>

    <div class="security-info">

        <div class="mini-card">
            <h3>PQC Verification</h3>
            <p>ML-DSA-44 Signature Validation</p>
        </div>

        <div class="mini-card">
            <h3>Secure Session</h3>
            <p>Encrypted Administrator Authentication</p>
        </div>

    </div>

    <!-- Graceful fallback if the user made an error entering their email -->
    <a href="/setup" class="resend-link">
        Change email or restart setup
    </a>

</div>

<!-- Standard theme controller script -->
<script>

    const toggle = document.getElementById("themeToggle");

    if(localStorage.getItem("theme") === "light"){
        document.body.classList.add("light-theme");
    }

    toggle.addEventListener("click", () => {

        document.body.classList.toggle("light-theme");

        if(document.body.classList.contains("light-theme")){
            localStorage.setItem("theme","light");
        }
        else{
            localStorage.setItem("theme","dark");
        }

    });

</script>

</body>
</html>
