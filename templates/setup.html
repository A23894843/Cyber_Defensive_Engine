<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Cyber Defensive Engine</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-gold: #fbbf24;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .setup-container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
        }

        .header-section {
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--accent-gold);
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--accent-gold);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: transparent;
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 4px;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--accent-gold);
            color: var(--bg-color);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            text-align: center;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="setup-container">
        <div class="header-section">
            <h1>Initial System Setup</h1>
            <p class="subtitle">Adaptive Cyber Defensive Engine | Project BCE-P663</p>
        </div>

        <form action="/setup" method="POST">
            <div class="form-group">
                <label for="name">ADMINISTRATOR NAME</label>
                <input type="text" id="name" name="name" placeholder="e.g. User's name" required>
            </div>

            <div class="form-group">
                <label for="email">ALARM RECEIVER EMAIL</label>
                <input type="email" id="email" name="email" placeholder="admin@security-node.com" required>
            </div>

            <button type="submit">Initialize Engine & Send OTP</button>
        </form>

        <div class="footer-note">
            SECURE ENVIRONMENT DETECTED // GKV HARIDWAR
        </div>
    </div>

</body>
</html>
