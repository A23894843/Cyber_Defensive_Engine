<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Adaptive Cyber Defensive Engine</title>
    <!-- Modern UI framework variables for Glassmorphism -->
    <style>
        :root{ --bg:#0f172a; --bg2:#111827; --card:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.12); --text:#f8fafc; --muted:#94a3b8; --primary:#38bdf8; --gold:#fbbf24; --purple:#8b5cf6; --red:#ef4444; --shadow:0 10px 35px rgba(0,0,0,0.45); }
        body.light-theme{ --bg:#f1f5f9; --bg2:#ffffff; --card:rgba(255,255,255,0.75); --border:rgba(15,23,42,0.08); --text:#0f172a; --muted:#475569; --primary:#0284c7; --gold:#d97706; --purple:#7c3aed; --red:#dc2626; --shadow:0 10px 25px rgba(0,0,0,0.08); }
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ background: radial-gradient(circle at top left,#1e293b 0%,transparent 25%), radial-gradient(circle at bottom right,#0f172a 0%,transparent 25%), linear-gradient(135deg,var(--bg),var(--bg2)); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; transition:0.4s ease; }
        body.light-theme{ background: radial-gradient(circle at top left,#bfdbfe 0%,transparent 25%), radial-gradient(circle at bottom right,#dbeafe 0%,transparent 25%), linear-gradient(135deg,#f8fafc,#e2e8f0); }
        
        .login-container{ width:100%; max-width:480px; background:var(--card); border:1px solid var(--border); backdrop-filter:blur(20px); border-radius:28px; padding:40px; box-shadow:var(--shadow); position:relative; overflow:hidden; animation:fadeIn 0.7s ease; }
        .login-container::before{ content:""; position:absolute; top:0; left:0; width:100%; height:5px; background:linear-gradient(to right, var(--red), var(--purple), var(--primary)); }
        @keyframes fadeIn{ from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:translateY(0); } }
        
        h1{ font-size:2rem; font-weight:700; text-align:center; background:linear-gradient(to right, var(--primary), var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:10px; }
        .subtitle{ text-align:center; color:var(--muted); font-size:0.95rem; line-height:1.7; margin-bottom:30px; }
        
        .form-group{ margin-bottom:24px; }
        label{ display:block; margin-bottom:10px; color:var(--primary); font-size:0.9rem; font-weight:600; letter-spacing:0.5px; }
        input{ width:100%; padding:15px 18px; border-radius:16px; border:1px solid var(--border); background:rgba(255,255,255,0.04); color:var(--text); font-size:0.95rem; outline:none; transition:0.3s ease; }
        input:focus{ border-color:var(--primary); box-shadow:0 0 15px rgba(56,189,248,0.25); }
        
        button{ width:100%; padding:16px; border:none; border-radius:18px; background:linear-gradient(135deg, var(--primary), var(--purple)); color:white; font-weight:700; font-size:0.95rem; letter-spacing:0.5px; cursor:pointer; transition:0.3s ease; margin-top:10px; box-shadow:0 10px 25px rgba(56,189,248,0.25); }
        button:hover{ transform:translateY(-3px); box-shadow:0 15px 35px rgba(56,189,248,0.45); }
        
        /* Displays errors flashed from the Flask backend (Invalid credentials) */
        .error-message { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.4); color: var(--red); padding: 12px; border-radius: 12px; text-align: center; margin-bottom: 20px; font-weight: 600; font-size: 0.9rem; }
        
        /* Theme Toggle Styles */
        .top-bar{ display:flex; justify-content:flex-end; align-items:center; margin-bottom:20px; }
        .theme-toggle{ width:72px; height:38px; border-radius:40px; background:rgba(255,255,255,0.08); border:1px solid var(--border); display:flex; align-items:center; padding:4px; position:relative; cursor:pointer; }
        .theme-toggle::before{ content:"☀️"; position:absolute; left:8px; font-size:13px; }
        .theme-toggle::after{ content:"🌙"; position:absolute; right:8px; font-size:13px; }
        .toggle-ball{ width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg, var(--primary), var(--purple)); transition:0.3s ease; z-index:2; }
        body.light-theme .toggle-ball{ transform:translateX(34px); }
    </style>
</head>
<body>

<div class="login-container">
    <!-- Theme Toggle Switch positioned at the top right of the login card -->
    <div class="top-bar">
        <div class="theme-toggle" id="themeToggle" title="Toggle Light/Dark Theme"><div class="toggle-ball"></div></div>
    </div>

    <h1>Administrator Access</h1>
    <p class="subtitle">Enter your credentials to access the<br>Adaptive Cyber Defensive Engine</p>

    <!-- Renders if auth fails -->
    {% if error %}
    <div class="error-message">
        ⚠️ {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="POST">
        <div class="form-group">
            <label for="email">ADMINISTRATOR EMAIL</label>
            <input type="email" id="email" name="email" placeholder="admin@security-node.com" required>
        </div>

        <div class="form-group">
            <label for="password">PASSWORD</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit">AUTHENTICATE & ENTER</button>
    </form>
</div>

<!-- Theme Persistence and Toggle Logic -->
<script>
    const toggle = document.getElementById("themeToggle");

    // Check LocalStorage to persist user's theme preference across page loads
    if(localStorage.getItem("theme") === "light"){
        document.body.classList.add("light-theme");
    }

    // Toggle the theme and save preference when clicked
    toggle.addEventListener("click", () => {
        document.body.classList.toggle("light-theme");
        if(document.body.classList.contains("light-theme")){
            localStorage.setItem("theme","light");
        } else {
            localStorage.setItem("theme","dark");
        }
    });
</script>

</body>
</html>
